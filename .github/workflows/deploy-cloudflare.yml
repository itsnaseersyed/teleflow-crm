name: Deploy to Cloudflare Pages + Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          node -v
          npm -v
          npm ci

      - name: Rebuild native modules (fix optional native binding issues)
        run: |
          # Some npm optional dependencies (native bindings) can fail during CI installs.
          # Rebuild native modules to ensure binary addons are correctly built for the runner.
          npm rebuild || true

      - name: Build
        run: npm run build

      - name: Install Wrangler CLI
        run: |
          npm install -g wrangler@latest

      - name: Publish to Cloudflare using Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          NODE_ENV: production
        run: |
          wrangler --version
          wrangler deploy --name teleflow-crm --assets dist/client
